<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <script>
      // EMERGENCY CACHE CLEAR & VERSION CHECK
      (function() {
        const CURRENT_VERSION = '1.0.8';
        const savedVersion = localStorage.getItem('xrostao_version');
        if (savedVersion !== CURRENT_VERSION) {
          localStorage.clear();
          sessionStorage.clear();
          localStorage.setItem('xrostao_version', CURRENT_VERSION);
          console.log('Cache cleared for version ' + CURRENT_VERSION);
          // Only reload if we actually had an old version to avoid loops
          if (savedVersion) window.location.reload(true);
        }
      })();
    </script>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Load Inter font as early as possible -->

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
